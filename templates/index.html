<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Robot Control</title>
<style>
:root {
  --bg:     #1a1a2e;
  --panel:  #16213e;
  --accent: #0f3460;
  --green:  #00d4aa;
  --red:    #e94560;
  --yellow: #f5a623;
  --white:  #e0e0e0;
  --gray:   #6b7280;
  --hover:  #1e4d8c;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--white); font-family: Helvetica, Arial, sans-serif; min-height: 100vh; }

#header {
  background: var(--accent);
  padding: 12px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 8px;
}
#header h1 { font-size: 1.3rem; font-weight: 700; }
#mode-badge {
  font-size: 0.8rem;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 12px;
  background: rgba(0,0,0,0.3);
}

#main {
  display: grid;
  grid-template-columns: 260px 1fr;
  grid-template-rows: 1fr auto;
  gap: 14px;
  padding: 14px;
  min-height: calc(100vh - 56px);
}
@media (max-width: 640px) {
  #main { grid-template-columns: 1fr; }
}

.panel {
  background: var(--panel);
  border-radius: 8px;
  padding: 14px;
}

#health-panel { grid-row: 1 / 3; }
@media (max-width: 640px) { #health-panel { grid-row: auto; } }

.panel-title {
  font-size: 0.75rem;
  font-weight: 700;
  letter-spacing: 0.1em;
  color: var(--gray);
  margin-bottom: 12px;
}
.status-row {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 8px;
}
.dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--gray);
  flex-shrink: 0;
  transition: background 0.3s;
}
.dot.green  { background: var(--green); box-shadow: 0 0 6px var(--green); }
.dot.red    { background: var(--red); }
.dot.yellow { background: var(--yellow); }
.status-label { flex: 1; font-size: 0.9rem; }
.status-val { font-size: 0.8rem; color: var(--gray); }

.section-label {
  font-size: 0.75rem;
  color: var(--gray);
  margin: 12px 0 6px;
  font-weight: 600;
}
.imu-row {
  display: flex;
  justify-content: space-between;
  font-size: 0.85rem;
  margin-bottom: 4px;
}
.imu-row span:last-child { font-weight: 600; }

/* Recording */
.rec-dot {
  width: 12px; height: 12px;
  border-radius: 50%;
  background: var(--gray);
  flex-shrink: 0;
  transition: background 0.3s;
}
.rec-dot.active {
  background: var(--red);
  box-shadow: 0 0 8px var(--red);
  animation: pulse-rec 1s infinite;
}
@keyframes pulse-rec {
  0%, 100% { box-shadow: 0 0 4px var(--red); }
  50%       { box-shadow: 0 0 12px var(--red); }
}
#rec-start-btn {
  background: var(--green);
  color: #000;
  border: none;
  border-radius: 6px;
  padding: 8px 14px;
  font-size: 0.82rem;
  font-weight: 700;
  cursor: pointer;
  flex: 1;
}
#rec-start-btn:hover:not(:disabled) { filter: brightness(1.1); }
#rec-start-btn:disabled { opacity: 0.4; cursor: default; }
#rec-stop-btn {
  background: var(--red);
  color: #fff;
  border: none;
  border-radius: 6px;
  padding: 8px 14px;
  font-size: 0.82rem;
  font-weight: 700;
  cursor: pointer;
  flex: 1;
}
#rec-stop-btn:hover:not(:disabled) { filter: brightness(1.15); }
#rec-stop-btn:disabled { opacity: 0.4; cursor: default; }

/* Capabilities */
#cap-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  align-content: start;
}
.cap-card {
  background: var(--accent);
  border-radius: 8px;
  padding: 18px 10px;
  text-align: center;
  cursor: pointer;
  transition: background 0.15s, box-shadow 0.15s;
  user-select: none;
}
.cap-card:hover { background: var(--hover); }
.cap-card.active {
  box-shadow: 0 0 0 2px var(--green);
  animation: pulse 1.5s infinite;
}
.cap-card.disabled { opacity: 0.4; cursor: default; pointer-events: none; }
@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 2px var(--green); }
  50%       { box-shadow: 0 0 0 4px var(--green); }
}
.cap-icon { font-size: 1.8rem; margin-bottom: 6px; }
.cap-name { font-size: 0.85rem; font-weight: 700; }
.cap-desc { font-size: 0.72rem; color: var(--gray); margin-top: 3px; }

/* Controls */
#controls {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}
#stop-btn {
  background: var(--red);
  color: white;
  border: none;
  border-radius: 6px;
  padding: 10px 22px;
  font-size: 0.9rem;
  font-weight: 700;
  cursor: pointer;
  opacity: 0.4;
  transition: opacity 0.2s;
}
#stop-btn:not(:disabled) { opacity: 1; }
#stop-btn:not(:disabled):hover { filter: brightness(1.15); }
#runcmd-btn {
  background: #1a3a1a;
  color: var(--green);
  border: 1px solid var(--green);
  border-radius: 6px;
  padding: 10px 18px;
  font-size: 0.85rem;
  font-weight: 700;
  cursor: pointer;
}
#runcmd-btn:hover { background: #1f5c1f; }
#shutdown-btn {
  background: #2d1a2e;
  color: #e94560;
  border: 1px solid #e94560;
  border-radius: 6px;
  padding: 10px 18px;
  font-size: 0.85rem;
  font-weight: 700;
  cursor: pointer;
  margin-left: auto;
}
#shutdown-btn:hover { background: #4a1a2e; }
#running-label { font-size: 0.85rem; color: var(--gray); }

/* Log */
#log-panel { grid-column: 2; }
@media (max-width: 640px) { #log-panel { grid-column: 1; } }
#log-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}
#clear-btn, #savelog-btn {
  background: var(--accent);
  color: var(--white);
  border: none;
  border-radius: 4px;
  padding: 3px 10px;
  font-size: 0.78rem;
  cursor: pointer;
}
#clear-btn:hover { background: var(--hover); }
#savelog-btn { background: #1a4a2e; color: var(--green); }
#savelog-btn:hover { background: #1f5c38; }
#log {
  background: #0d1117;
  border-radius: 4px;
  padding: 8px;
  height: 160px;
  overflow-y: auto;
  font-family: monospace;
  font-size: 0.8rem;
  color: var(--green);
  line-height: 1.5;
}
@media (max-width: 640px) { #log { height: 120px; } }
.log-line { word-break: break-all; }
</style>
</head>
<body>

<div id="header">
  <div style="display:flex;align-items:center;gap:16px;">
    <span style="font-size:1.3rem;font-weight:700;">ROBOT CONTROL</span>
    <select id="robot-select" style="background:#1a5276;color:#e0e0e0;border:1px solid #0f3460;border-radius:6px;padding:4px 10px;font-size:0.9rem;cursor:pointer;">
      <option value="g1" selected>Unitree G1</option>
      <option value="bd" disabled>Boston Dynamics (coming soon)</option>
    </select>
  </div>
  <div id="mode-badge">...</div>
</div>

<div id="main">

  <!-- Health Panel -->
  <div class="panel" id="health-panel">
    <div class="panel-title">HEALTH STATUS</div>
    <div class="status-row">
      <div class="dot" id="dot-conn"></div>
      <span class="status-label">Connection</span>
      <span class="status-val" id="val-conn">—</span>
    </div>
    <div class="section-label">Robot Mode</div>
    <div class="imu-row"><span>Mode</span><span id="robot-mode" style="color:var(--green);font-weight:700;">—</span></div>
    <div class="imu-row"><span>Gait</span><span id="robot-gait" style="color:var(--yellow);">—</span></div>
    <div class="section-label">IMU</div>
    <div class="imu-row"><span>Roll</span><span id="imu-roll">—</span></div>
    <div class="imu-row"><span>Pitch</span><span id="imu-pitch">—</span></div>
    <div class="imu-row"><span>Yaw</span><span id="imu-yaw">—</span></div>
    <div class="section-label">Joints</div>
    <div class="imu-row"><span>L Shoulder (15)</span><span id="j-left">—</span></div>
    <div class="imu-row"><span>R Shoulder (22)</span><span id="j-right">—</span></div>

    <div class="section-label">RECORDING</div>
    <div class="status-row">
      <div class="rec-dot" id="rec-dot"></div>
      <span class="status-label" id="rec-status">Idle</span>
    </div>
    <div style="display:flex;gap:8px;margin-top:8px;">
      <button id="rec-start-btn" onclick="startRecording()">&#9679; Record</button>
      <button id="rec-stop-btn" onclick="stopRecording()" disabled>&#9632; Stop</button>
    </div>
  </div>

  <!-- Capabilities Grid -->
  <div class="panel" id="cap-panel">
    <div class="panel-title">CAPABILITIES</div>
    <div id="cap-grid"><div style="color:var(--gray);font-size:0.85rem;">Loading...</div></div>
  </div>

  <!-- Controls Bar -->
  <div class="panel" id="controls-panel" style="grid-column:2;">
    <div id="controls">
      <button id="stop-btn" disabled onclick="stopCapability()">&#9632; STOP</button>
      <span id="running-label">No capability running</span>
      <button id="runcmd-btn" onclick="runCommands()">&#9654; Run Commands</button>
      <button id="shutdown-btn" onclick="shutdownServer()">&#9211; Shut Down Server</button>
    </div>
  </div>

  <!-- Log Panel -->
  <div class="panel" id="log-panel">
    <div id="log-header">
      <div class="panel-title" style="margin:0;">LOG</div>
      <button id="savelog-btn" onclick="saveLog()">Save Log</button>
      <button id="clear-btn" onclick="clearLog()">Clear</button>
    </div>
    <div id="log"></div>
  </div>

</div>

<script>
let currentRunId = null;
let currentCard  = null;
let evtSource    = null;
let _recording   = false;
let _recPollId   = null;

// ── Health ────────────────────────────────────────────────────────────────────
async function fetchHealth() {
  try {
    const r = await fetch('/api/health');
    const d = await r.json();
    const badge = document.getElementById('mode-badge');
    if (d.offline_mode) {
      badge.textContent = 'OFFLINE MODE';
      badge.style.color = '#f5a623';
    } else {
      badge.textContent = 'LIVE MODE';
      badge.style.color = '#00d4aa';
    }
    const dot = document.getElementById('dot-conn');
    const val = document.getElementById('val-conn');
    if (d.offline_mode) {
      dot.className = 'dot yellow'; val.textContent = 'OFFLINE';
    } else if (d.connected) {
      dot.className = 'dot green';  val.textContent = 'OK';
    } else {
      dot.className = 'dot red';    val.textContent = 'NO SIGNAL';
    }
    document.getElementById('imu-roll').textContent  = d.imu.roll  + ' rad';
    document.getElementById('imu-pitch').textContent = d.imu.pitch + ' rad';
    document.getElementById('imu-yaw').textContent   = d.imu.yaw   + ' rad';
    document.getElementById('j-left').textContent    = d.joints.left_shoulder  + ' rad';
    document.getElementById('j-right').textContent   = d.joints.right_shoulder + ' rad';
    if (d.mode) document.getElementById('robot-mode').textContent = d.mode;
    if (d.gait) document.getElementById('robot-gait').textContent = d.gait;
  } catch(e) {}
}

// ── Capabilities ──────────────────────────────────────────────────────────────
async function fetchCapabilities() {
  try {
    const r = await fetch('/api/capabilities');
    const caps = await r.json();
    const grid = document.getElementById('cap-grid');
    grid.innerHTML = '';
    caps.forEach(cap => {
      const card = document.createElement('div');
      card.className = 'cap-card';
      card.dataset.script = cap.script;
      card.innerHTML = `<div class="cap-icon">${cap.icon}</div>
        <div class="cap-name">${cap.name}</div>
        <div class="cap-desc">${cap.description}</div>`;
      card.addEventListener('click', () => runCapability(card, cap.script));
      grid.appendChild(card);
    });
  } catch(e) {}
}

// ── Run ───────────────────────────────────────────────────────────────────────
async function runCapability(card, script) {
  if (currentRunId) return;
  try {
    const r = await fetch('/api/run', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({script})
    });
    const d = await r.json();
    if (d.error) { appendLog('Error: ' + d.error); return; }
    currentRunId = d.run_id;
    currentCard  = card;
    card.classList.add('active');
    document.querySelectorAll('.cap-card').forEach(c => { if (c !== card) c.classList.add('disabled'); });
    document.getElementById('stop-btn').disabled = false;
    document.getElementById('running-label').textContent = 'Running: ' + card.querySelector('.cap-name').textContent;
    startStream(d.run_id);
  } catch(e) { appendLog('Network error'); }
}

function startStream(runId) {
  if (evtSource) evtSource.close();
  evtSource = new EventSource('/api/output/' + runId);
  evtSource.onmessage = (e) => {
    if (e.data === '[done]') { clearActiveState(); evtSource.close(); return; }
    appendLog(e.data);
  };
  evtSource.onerror = () => { clearActiveState(); evtSource.close(); };
}

// ── Stop ──────────────────────────────────────────────────────────────────────
async function stopCapability() {
  try { await fetch('/api/stop', {method: 'POST'}); } catch(e) {}
  if (evtSource) { evtSource.close(); evtSource = null; }
  clearActiveState();
  appendLog('Stopped.');
}

function clearActiveState() {
  currentRunId = null;
  if (currentCard) { currentCard.classList.remove('active'); currentCard = null; }
  document.querySelectorAll('.cap-card').forEach(c => c.classList.remove('disabled'));
  document.getElementById('stop-btn').disabled = true;
  document.getElementById('running-label').textContent = 'No capability running';
}

// ── Recording ─────────────────────────────────────────────────────────────────
async function startRecording() {
  if (_recording) return;
  try {
    const r = await fetch('/api/record/start', {method: 'POST'});
    const d = await r.json();
    if (!d.ok) { appendLog('Recording start failed'); return; }
    _recording = true;
    document.getElementById('rec-dot').classList.add('active');
    document.getElementById('rec-status').textContent = 'Recording...';
    document.getElementById('rec-start-btn').disabled = true;
    document.getElementById('rec-stop-btn').disabled  = false;
    appendLog('=== Recording started — perform gestures now ===');
    if (d.offline) appendLog('WARNING: offline mode — no real data captured');
    if (d.cb_count_at_start !== undefined) appendLog('LowState callbacks before record: ' + d.cb_count_at_start + (d.cb_count_at_start === 0 ? ' ← WARNING: 0 means robot data not reaching server. Restart server.' : ' ✓'));
    // Poll status every second to show live sample count
    _recPollId = setInterval(async () => {
      try {
        const rs = await fetch('/api/status');
        const rd = await rs.json();
        if (rd.recording) {
          let label = 'Recording: ' + rd.rec_samples + ' samples';
          if (rd.gesture && rd.gesture.holding && rd.gesture.name) label += '  |  gesture: ' + rd.gesture.name;
          document.getElementById('rec-status').textContent = label;
        }
      } catch(e) {}
    }, 1000);
  } catch(e) { appendLog('Recording error: ' + e); }
}

async function stopRecording() {
  if (!_recording) return;
  try {
    const r = await fetch('/api/record/stop', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({label: 'session'})
    });
    const d = await r.json();
    _recording = false;
    if (_recPollId) { clearInterval(_recPollId); _recPollId = null; }
    document.getElementById('rec-dot').classList.remove('active');
    document.getElementById('rec-status').textContent = 'Idle';
    document.getElementById('rec-start-btn').disabled = false;
    document.getElementById('rec-stop-btn').disabled  = true;

    if (d.ok && d.samples > 0) {
      appendLog('=== Recording stopped: ' + d.samples + ' samples → ' + d.file + ' ===');
      if (d.cb_count_total !== undefined) appendLog('Total LowState callbacks seen by server: ' + d.cb_count_total);
      const s = d.summary;
      if (s) {
        appendLog('Duration: ' + s.duration_s + 's');
        if (s.gestures_detected && s.gestures_detected.length > 0) {
          appendLog('Gestures detected: ' + s.gestures_detected.map(g => g.name + '(t=' + g.t_start + 's)').join(', '));
        }
        if (s.joints_moved && s.joints_moved.length > 0) {
          appendLog('Joints moved:');
          s.joints_moved.forEach(j => appendLog('  [' + j.idx + '] ' + j.name + ': ' + j.range_deg.toFixed(1) + ' deg  peak_tau=' + j.peak_tau + ' Nm'));
        } else {
          appendLog('No significant joint movement detected (>3 deg threshold)');
        }
        if (s.mode_transitions && s.mode_transitions.length > 1) {
          appendLog('Mode transitions: ' + s.mode_transitions.map(m => 't=' + m.t + 's→' + m.sport_mode).join(', '));
        }
      }
    } else {
      const note = (d.summary && d.summary.note) ? d.summary.note : 'no data recorded';
      appendLog('=== Recording stopped: ' + note + ' ===');
    }
  } catch(e) { appendLog('Recording stop error: ' + e); }
}

// ── Log ───────────────────────────────────────────────────────────────────────
function appendLog(msg) {
  const log = document.getElementById('log');
  const line = document.createElement('div');
  line.className = 'log-line';
  const ts = new Date().toLocaleTimeString('en-US', {hour12: false});
  line.textContent = '[' + ts + '] ' + msg;
  log.appendChild(line);
  log.scrollTop = log.scrollHeight;
}
function clearLog() { document.getElementById('log').innerHTML = ''; }

function fixGrid() {
  const ctrl = document.getElementById('controls-panel');
  const log  = document.getElementById('log-panel');
  if (window.innerWidth <= 640) {
    ctrl.style.gridColumn = '1'; log.style.gridColumn = '1';
  } else {
    ctrl.style.gridColumn = '2'; log.style.gridColumn = '2';
  }
}

// ── Save Log ──────────────────────────────────────────────────────────────────
async function saveLog() {
  const lines = [...document.querySelectorAll('#log .log-line')].map(l => l.textContent).join('\n');
  const btn = document.getElementById('savelog-btn');
  btn.textContent = 'Saving...';
  try {
    const r = await fetch('/api/savelog', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({log: lines})
    });
    const d = await r.json();
    btn.textContent = d.ok ? 'Saved!' : 'Error';
    setTimeout(() => btn.textContent = 'Save Log', 2000);
    if (d.ok) clearLog();
  } catch(e) {
    btn.textContent = 'Error';
    setTimeout(() => btn.textContent = 'Save Log', 2000);
  }
}

// ── Run Commands ──────────────────────────────────────────────────────────────
async function runCommands() {
  const btn = document.getElementById('runcmd-btn');
  btn.textContent = 'Pulling & Running...';
  btn.disabled = true;
  try {
    const r = await fetch('/api/runcommands', {method: 'POST'});
    const d = await r.json();
    if (d.error) { appendLog('Error: ' + d.error); }
    else {
      currentRunId = d.run_id;
      document.getElementById('running-label').textContent = 'Running: Commands';
      document.getElementById('stop-btn').disabled = false;
      startStream(d.run_id);
    }
  } catch(e) { appendLog('Network error'); }
  btn.textContent = 'Run Commands';
  btn.disabled = false;
}

// ── Shutdown ──────────────────────────────────────────────────────────────────
async function shutdownServer() {
  if (!confirm('Shut down the server? You will need to restart it manually.')) return;
  appendLog('Shutting down server...');
  try { await fetch('/api/shutdown', {method: 'POST'}); } catch(e) {}
  document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#1a1a2e;color:#e0e0e0;font-family:Helvetica;font-size:1.2rem;">Server stopped. Double-click the desktop icon to restart.</div>';
}

// ── Init ──────────────────────────────────────────────────────────────────────
fetch('/api/forceStop', {method: 'POST'}).catch(() => {});
fetchHealth();
fetchCapabilities();
setInterval(fetchHealth, 2000);
fixGrid();
window.addEventListener('resize', fixGrid);
</script>
</body>
</html>
